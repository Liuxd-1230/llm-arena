<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Arena - 大模型能力盲测平台</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root {
  --s0:#09090b;--s1:#111113;--s2:#18181b;--s3:#1f1f23;--s4:#27272a;
  --bdr:rgba(255,255,255,0.06);--bdr2:rgba(255,255,255,0.10);--bdr3:rgba(255,255,255,0.15);
  --t1:#fafafa;--t2:#a1a1aa;--t3:#71717a;--t4:#52525b;
  --ac:#3b82f6;--ac2:rgba(59,130,246,0.12);
  --gn:#22c55e;--gn2:rgba(34,197,94,0.12);
  --am:#f59e0b;--am2:rgba(245,158,11,0.12);
  --rd:#ef4444;--rd2:rgba(239,68,68,0.12);
  --pk:#ec4899;--pk2:rgba(236,72,153,0.12);
  --cy:#06b6d4;--cy2:rgba(6,182,212,0.12);
  --pu:#a855f7;--pu2:rgba(168,85,247,0.12);
  --r6:6px;--r8:8px;--r12:12px;--r16:16px;
  --sans:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'Geist Mono','SF Mono','Fira Code',monospace;
}
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Geist Mono';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/GeistMono-Regular.woff2') format('woff2');font-weight:400;font-display:swap}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--s0);color:var(--t1);line-height:1.5;min-height:100dvh}
::selection{background:var(--ac);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

/* Layout */
.shell{max-width:1280px;margin:0 auto;padding:0 24px}
.nav{position:sticky;top:0;z-index:50;background:rgba(9,9,11,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-0.3px}
.nav-icon{width:28px;height:28px;background:var(--ac);border-radius:var(--r6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.main-grid{display:grid;grid-template-columns:240px 1fr;gap:1px;background:var(--bdr);min-height:calc(100dvh - 56px)}
.sidebar{background:var(--s1);padding:20px 0;overflow-y:auto}
.content{background:var(--s0);padding:24px 32px;overflow-y:auto}

/* Sidebar */
.sb-section{margin-bottom:24px}
.sb-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t4);padding:0 16px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:all 0.1s;font-size:13px;color:var(--t2);border-left:2px solid transparent}
.sb-item:hover{color:var(--t1);background:var(--s2)}
.sb-item.active{color:var(--t1);background:var(--ac2);border-left-color:var(--ac)}
.sb-item i{font-size:16px;width:18px;text-align:center}
.sb-item .badge{margin-left:auto;font-size:10px;font-weight:600;padding:1px 6px;border-radius:100px;background:var(--s3);color:var(--t3)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r8);font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all 0.15s;border:1px solid transparent;white-space:nowrap}
.btn:active{transform:scale(0.98)}
.btn-ghost{background:transparent;color:var(--t2);border-color:transparent}.btn-ghost:hover{color:var(--t1);background:var(--s3)}
.btn-outline{background:transparent;color:var(--t2);border-color:var(--bdr)}.btn-outline:hover{color:var(--t1);border-color:var(--bdr2);background:var(--s2)}
.btn-primary{background:var(--ac);color:#fff;border-color:var(--ac)}.btn-primary:hover{background:#2563eb}
.btn-danger{background:var(--rd);color:#fff;border-color:var(--rd)}.btn-danger:hover{background:#dc2626}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:var(--r6)}
.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--r8);background:transparent;color:var(--t3);border:1px solid transparent;cursor:pointer;transition:all 0.15s}
.btn-icon:hover{color:var(--t1);background:var(--s3)}

/* Section */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.sec-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.sec-desc{font-size:13px;color:var(--t3);margin-top:4px}

/* Difficulty pills */
.diff-row{display:flex;gap:6px;margin-bottom:20px}
.diff-pill{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--bdr);background:transparent;color:var(--t3);font-family:var(--sans)}
.diff-pill:hover{border-color:var(--bdr2);color:var(--t2)}
.diff-pill.active{background:var(--ac2);border-color:rgba(59,130,246,0.3);color:var(--ac)}

/* Question cards */
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.q-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r12);padding:16px;cursor:pointer;transition:all 0.15s}
.q-card:hover{border-color:var(--bdr2);background:var(--s2)}
.q-card.selected{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.q-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-card-diff{font-size:10px;font-weight:600;padding:2px 6px;border-radius:100px}
.q-card-name{font-size:14px;font-weight:600;margin-bottom:4px}
.q-card-desc{font-size:12px;color:var(--t3);line-height:1.5}

/* Input */
.input{width:100%;padding:8px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);color:var(--t1);font-size:13px;outline:none;font-family:var(--sans);transition:border-color 0.15s}
.input:focus{border-color:var(--ac)}
.textarea{width:100%;min-height:180px;padding:14px;background:var(--s0);border:1px solid var(--bdr);border-radius:var(--r8);color:var(--t1);font-family:var(--mono);font-size:13px;line-height:1.6;resize:vertical;outline:none}
.textarea:focus{border-color:var(--ac)}
.textarea::placeholder{color:var(--t4)}
.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t4);margin-bottom:6px}

/* Card */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r12);overflow:hidden}
.card-header{padding:14px 20px;background:var(--s2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}

/* Tabs */
.tab-row{display:flex;gap:2px;background:var(--s2);padding:3px;border-radius:var(--r8);margin-bottom:20px;border:1px solid var(--bdr)}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;background:transparent;border:none;border-radius:var(--r6);color:var(--t3);font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all 0.15s}
.tab-btn:hover{color:var(--t2)}.tab-btn.active{color:var(--t);background:var(--s3)}

/* Blind entry list */
.entry-list{display:flex;flex-direction:column;gap:8px}
.entry-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);transition:all 0.15s}
.entry-item:hover{border-color:var(--bdr2)}
.entry-blind-id{font-family:var(--mono);font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;background:var(--s4);color:var(--t2);min-width:50px;text-align:center}
.entry-model{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.entry-dim{font-size:11px;color:var(--t3)}
.entry-status{font-size:11px;padding:2px 8px;border-radius:100px}
.entry-status.pending{background:var(--am2);color:var(--am)}
.entry-status.scored{background:var(--gn2);color:var(--gn)}

/* Fullscreen blind test overlay */
.blind-overlay{position:fixed;inset:0;z-index:100;background:var(--s0);display:none;flex-direction:column}
.blind-overlay.show{display:flex}
.blind-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--s1);border-bottom:1px solid var(--bdr);flex-shrink:0}
.blind-topbar-left{display:flex;align-items:center;gap:12px}
.blind-topbar-right{display:flex;align-items:center;gap:8px}
.blind-progress{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.blind-progress-bar{width:120px;height:4px;background:var(--s4);border-radius:2px}
.blind-progress-fill{height:100%;border-radius:2px;background:var(--ac);transition:width 0.3s}
.blind-main{flex:1;overflow:auto;display:flex;flex-direction:column}
.blind-preview-area{flex:1;background:#fff;border:none;width:100%;display:block}
.blind-answer-area{display:none;max-height:40vh;overflow:auto;background:var(--s1);border-top:1px solid var(--bdr);padding:20px}
.blind-answer-area.show{display:block}
.blind-answer-pre{font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--t2);white-space:pre-wrap;max-height:35vh;overflow:auto}
.blind-score-bar{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--s1);border-top:1px solid var(--bdr);flex-shrink:0}
.blind-score-input{width:80px;padding:8px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);color:var(--t1);font-size:20px;font-weight:700;text-align:center;font-family:var(--mono);outline:none}
.blind-score-input:focus{border-color:var(--ac)}
.blind-score-max{font-size:14px;color:var(--t4)}
.blind-note{flex:1;padding:8px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);color:var(--t1);font-size:13px;outline:none;font-family:var(--sans)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:var(--s3);border:1px solid var(--bdr);border-radius:var(--r8);font-size:13px;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all 0.2s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r16);padding:28px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal-box p{font-size:13px;color:var(--t3);margin-bottom:16px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Compare table */
.cmp-table{width:100%;border-collapse:collapse}
.cmp-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t4);border-bottom:1px solid var(--bdr)}
.cmp-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--bdr)}
.cmp-table tr:hover td{background:var(--s2)}
.cmp-rank{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cmp-r1{background:var(--am2);color:var(--am)}.cmp-r2{background:var(--s3);color:var(--t2)}.cmp-r3{background:var(--am2);color:#cd7f32}

/* Score card */
.score-big{font-size:48px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.dim-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.dim-item{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);padding:14px}
.dim-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dim-item-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.dim-item-score{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.dim-bar-track{height:3px;background:var(--s4);border-radius:2px;margin-bottom:10px}
.dim-bar-fill{height:100%;border-radius:2px;transition:width 0.6s}

/* Prompt viewer */
.prompt-box{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r8);padding:20px;font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--t3);white-space:pre-wrap;max-height:600px;overflow-y:auto}

/* Func check */
.func-check-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px}

@media(max-width:900px){
  .main-grid{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}
  .dim-grid{grid-template-columns:1fr}.q-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="shell nav-inner">
    <div class="nav-brand">
      <div class="nav-icon"><i class="ri-flask-line"></i></div>
      <span>LLM Arena</span>
      <span style="font-size:11px;color:var(--t4);font-weight:400;">v2.0</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportAll()"><i class="ri-download-2-line"></i> 导出</button>
      <button class="btn btn-outline btn-sm" onclick="showRevealModal()"><i class="ri-eye-line"></i> 揭盲</button>
    </div>
  </div>
</nav>

<div class="main-grid">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="main"></main>
</div>

<!-- Fullscreen Blind Test Overlay -->
<div class="blind-overlay" id="blindOverlay">
  <div class="blind-topbar">
    <div class="blind-topbar-left">
      <button class="btn btn-ghost btn-sm" onclick="exitBlind()"><i class="ri-close-line"></i> 退出盲测</button>
      <span id="blindTitle" style="font-size:14px;font-weight:600;"></span>
      <span id="blindId" style="font-family:var(--mono);font-size:12px;padding:2px 8px;border-radius:100px;background:var(--s3);color:var(--t3);"></span>
    </div>
    <div class="blind-topbar-right">
      <div class="blind-progress">
        <span id="blindProgressText"></span>
        <div class="blind-progress-bar"><div class="blind-progress-fill" id="blindProgressFill"></div></div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnToggleCode" onclick="toggleCode()"><i class="ri-code-s-slash-line"></i> 查看代码</button>
    </div>
  </div>
  <div class="blind-main">
    <iframe class="blind-preview-area" id="blindFrame"></iframe>
    <div class="blind-answer-area" id="blindCodeArea">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t4);margin-bottom:8px;">模型回答代码</div>
      <pre class="blind-answer-pre" id="blindCodePre"></pre>
    </div>
  </div>
  <div class="blind-score-bar">
    <span style="font-size:13px;font-weight:600;">评分:</span>
    <input type="number" class="blind-score-input" id="blindScoreInput" min="0" max="100" placeholder="0">
    <span class="blind-score-max" id="blindScoreMax">/ 100</span>
    <input type="text" class="blind-note" id="blindNoteInput" placeholder="评分备注（可选）">
    <button class="btn btn-primary" onclick="submitBlindScore()"><i class="ri-check-line"></i> 提交并下一个</button>
    <button class="btn btn-outline" onclick="skipBlind()"><i class="ri-skip-forward-line"></i> 跳过</button>
  </div>
</div>

<!-- Reveal Modal -->
<div class="modal-bg" id="revealModal">
  <div class="modal-box">
    <h3><i class="ri-eye-line"></i> 揭盲确认</h3>
    <p>揭盲后将显示所有模型的真实名称。确认？</p>
    <div id="revealMapping" style="font-family:var(--mono);font-size:12px;line-height:2;color:var(--t2);margin-bottom:16px;"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeRevealModal()">取消</button>
      <button class="btn btn-primary" onclick="doReveal()"><i class="ri-eye-line"></i> 确认揭盲</button>
    </div>
  </div>
</div>

<!-- Func Check Modal -->
<div class="modal-bg" id="funcModal">
  <div class="modal-box" style="max-width:700px;">
    <h3><i class="ri-checkbox-circle-line"></i> 功能检测结果</h3>
    <div id="funcResults"></div>
    <div id="funcSummary" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);font-size:13px;"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeFuncModal()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ri-check-line" style="color:var(--gn);"></i><span id="toastMsg"></span></div>

<script>
const DIMS=[
  {id:"code_frontend",name:"前端代码美感",icon:"ri-palette-line",color:"#3b82f6",desc:"HTML/CSS视觉设计、交互体验、创意表现",isCode:true},
  {id:"code_algo",name:"算法与编程",icon:"ri-code-s-slash-line",color:"#22c55e",desc:"算法设计、代码质量、调试能力"},
  {id:"reasoning",name:"逻辑推理",icon:"ri-brain-line",color:"#a855f7",desc:"数学推理、逻辑判断、因果分析"},
  {id:"knowledge",name:"知识问答",icon:"ri-book-open-line",color:"#f59e0b",desc:"科学、历史、文化、技术知识"},
  {id:"chinese",name:"中文能力",icon:"ri-quill-pen-line",color:"#ec4899",desc:"成语、诗词、文言文、中文表达"},
  {id:"writing",name:"写作能力",icon:"ri-article-line",color:"#06b6d4",desc:"创意写作、技术文档、商业文案"},
  {id:"creative",name:"创意思维",icon:"ri-lightbulb-flash-line",color:"#eab308",desc:"头脑风暴、类比联想、发散思维"},
  {id:"safety",name:"安全伦理",icon:"ri-shield-check-line",color:"#ef4444",desc:"拒绝有害请求、偏见检测"},
  {id:"instruction",name:"指令遵循",icon:"ri-list-check-3",color:"#6366f1",desc:"格式遵循、约束满足、多步指令"},
  {id:"long_context",name:"长文本理解",icon:"ri-file-text-line",color:"#4ade80",desc:"长文阅读、信息提取、总结能力"},
];
const DIFFS=[
  {id:"bronze",name:"青铜",emoji:"🥉",max:60},
  {id:"silver",name:"白银",emoji:"🥈",max:75},
  {id:"gold",name:"黄金",emoji:"🥇",max:90},
  {id:"diamond",name:"钻石",emoji:"💎",max:100},
];
const QS=[
  // Frontend
  {dim:"code_frontend",diff:"bronze",name:"高级感按钮组",prompt:"用纯HTML+CSS实现4种状态的按钮(默认/悬停/禁用/加载)，深色系，精致阴影和过渡。只输出代码。"},
  {dim:"code_frontend",diff:"bronze",name:"极简产品卡片",prompt:"纯HTML+CSS产品卡片：图片占位/标题/描述/价格/购买按钮。极简风格，留白，微妙阴影。只输出代码。"},

// Main content
function render(){
  const el=document.getElementById('main');
  if(S.view==='welcome')renderWelcome(el);
  else if(S.view==='dim')renderDim(el);
  else if(S.view==='entries')renderEntries(el);
  else if(S.view==='compare')renderCompare(el);
  else if(S.view==='prompt')renderPrompt(el);
}

function renderWelcome(el){
  el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;opacity:0.3;"><i class="ri-flask-line"></i></div>

}

function selectDim(id){S.view='welcome';S.dim=id;S.diff='all';S.q=null;renderSidebar();S.view='dim';render();}

function showCompare(){S.view='compare';S.dim=null;renderSidebar();render();}
function showPrompt(){S.view='prompt';S.dim=null;renderSidebar();render();}

    </div>
    <div class="q-grid">
      ${filtered.map(q=>{
        const dm=DIFFS.find(d=>d.id===q.diff);

          <div class="q-card-head"><span class="q-card-diff" style="background:${dim.color}15;color:${dim.color}">${dm.emoji} ${dm.name}</span><span style="margin-left:auto;font-size:11px;color:var(--t4);">上限${dm.max}分</span></div>

    </div>

  `;
}

function selectQ(dim,diff,name){
  S.q=QS.find(q=>q.dim===dim&&q.diff===diff&&q.name===name);

  setTimeout(()=>{const p=document.getElementById('collectPanel');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},100);

// Add entry
function addEntry(){
  const model=document.getElementById('cModel')?.value?.trim();
  const answer=document.getElementById('cAnswer')?.value?.trim();
  if(!model){toast('请输入模型名称','ri-error-warning-line');return;}
  if(!answer){toast('请粘贴模型回答','ri-error-warning-line');return;}
  const blindId='#'+String(S.nextId).padStart(3,'0');
  S.entries.push({id:S.nextId,blindId,model,dimId:S.dim,qName:S.q.name,qDiff:S.q.diff,prompt:S.q.prompt,answer,score:null,note:'',funcCheck:null});
  S.nextId++;
  save();
  document.getElementById('cModel').value='';
  document.getElementById('cAnswer').value='';
  toast(`已添加 ${blindId}`);
  render();
}

function removeEntry(id){S.entries=S.entries.filter(e=>e.id!==id);save();render();}

// Func check
function runFuncCheck(){
  const code=document.getElementById('cAnswer')?.value?.trim();
  if(!code){toast('请先粘贴代码','ri-error-warning-line');return;}
  const checks=[];
  let canRender=true,errorMsg='';
  try{const f=document.getElementById('blindFrame');/* temp */}catch(e){canRender=false;errorMsg=e.message;}
  checks.push({name:'代码可渲染',pass:canRender,detail:canRender?'无运行时错误':'错误: '+errorMsg});
  const hasDoctype=code.includes('<!DOCTYPE')||code.includes('<!doctype');
  checks.push({name:'DOCTYPE',pass:hasDoctype,detail:hasDoctype?'包含':'缺少'});
  const hasStyle=code.includes('<style')||code.includes('style=');
  checks.push({name:'CSS样式',pass:hasStyle,detail:hasStyle?'有':'无'});
  const hasHover=code.includes(':hover');
  checks.push({name:'悬停状态',pass:hasHover,detail:hasHover?'有':'无'});
  const hasTrans=code.includes('transition')||code.includes('animation');
  checks.push({name:'过渡/动画',pass:hasTrans,detail:hasTrans?'有':'无'});
  const hasMedia=code.includes('@media');
  checks.push({name:'响应式',pass:hasMedia,detail:hasMedia?'有':'无'});
  const semTags=['header','nav','main','section','article','footer'].filter(t=>code.includes('<'+t));
  checks.push({name:'语义化HTML',pass:semTags.length>=2,detail:semTags.length>0?semTags.join(', '):'无'});
  const btns=(code.match(/<button|<a |<input|<select/g)||[]).length;
  checks.push({name:'交互元素',pass:btns>0,detail:btns>0?btns+'个':'无'});

  const passed=checks.filter(c=>c.pass).length;
  const pct=(passed/checks.length*100).toFixed(0);
  document.getElementById('funcResults').innerHTML=checks.map(c=>`
    <div class="func-check-item"><i class="${c.pass?'ri-checkbox-circle-fill':'ri-close-circle-fill'}" style="color:${c.pass?'var(--gn)':'var(--rd)'};font-size:14px;"></i><span style="font-weight:500;min-width:80px;">${c.name}</span><span style="color:var(--t3);">${c.detail}</span></div>
  `).join('');
  const color=pct>=80?'var(--gn)':pct>=50?'var(--am)':'var(--rd)';
  document.getElementById('funcSummary').innerHTML=`通过率: <strong style="color:${color}">${passed}/${checks.length} (${pct}%)</strong> — ${pct>=80?'功能完整':'功能有缺失'}`;
  document.getElementById('funcModal').classList.add('show');
}
function closeFuncModal(){document.getElementById('funcModal').classList.remove('show');}

// ===== BLIND TEST =====
function startBlind(){
  const queue=S.entries.filter(e=>e.score===null||e.score===undefined);
  if(queue.length===0){toast('没有待测项目','ri-error-warning-line');return;}
  S.blindQueue=shuffle([...queue]);
  S.blindIdx=0;
  showBlindItem();
  document.getElementById('blindOverlay').classList.add('show');
}

function showBlindItem(){
  if(S.blindIdx>=S.blindQueue.length){exitBlind();toast('盲测完成！');showCompare();return;}
  const item=S.blindQueue[S.blindIdx];
  const dim=DIMS.find(d=>d.id===item.dimId);
  const dm=DIFFS.find(d=>d.id===item.qDiff);

  document.getElementById('blindTitle').textContent=`${dim.name} · ${item.qName}`;
  document.getElementById('blindId').textContent=item.blindId;
  document.getElementById('blindProgressText').textContent=`${S.blindIdx+1}/${S.blindQueue.length}`;
  document.getElementById('blindProgressFill').style.width=`${(S.blindIdx+1)/S.blindQueue.length*100}%`;
  document.getElementById('blindScoreMax').textContent=`/ ${dm.max}`;
  document.getElementById('blindScoreInput').max=dm.max;
  document.getElementById('blindScoreInput').value='';
  document.getElementById('blindNoteInput').value='';

  // For code_frontend: render in iframe; for others: show as plain text in iframe
  const frame=document.getElementById('blindFrame');
  if(item.dimId==='code_frontend'){
    frame.style.display='block';
    const doc=frame.contentDocument||frame.contentWindow.document;
    doc.open();doc.write(item.answer);doc.close();
    document.getElementById('btnToggleCode').style.display='';
    document.getElementById('blindCodeArea').classList.remove('show');
    document.getElementById('blindCodePre').textContent='';
  } else {
    // For non-code: show answer as rendered text page
    frame.style.display='block';
    const doc=frame.contentDocument||frame.contentWindow.document;
    doc.open();
    doc.write(`<!DOCTYPE html><html><head><style>
      body{font-family:-apple-system,system-ui,sans-serif;max-width:800px;margin:40px auto;padding:0 24px;color:#1a1a1a;line-height:1.8;font-size:15px;}
      pre{background:#f4f4f5;padding:16px;border-radius:8px;overflow:auto;font-size:13px;line-height:1.6;}
      code{background:#f4f4f5;padding:2px 6px;border-radius:4px;font-size:13px;}
      h1,h2,h3{margin-top:1.5em;margin-bottom:0.5em;}
      p{margin-bottom:1em;}
    </style></head><body><pre style="white-space:pre-wrap;background:transparent;padding:0;">${escHtml(item.answer)}</pre></body></html>`);
    doc.close();
    document.getElementById('btnToggleCode').style.display='none';
    document.getElementById('blindCodeArea').classList.remove('show');
  }

  setTimeout(()=>document.getElementById('blindScoreInput').focus(),100);
}

function toggleCode(){
  const area=document.getElementById('blindCodeArea');
  if(area.classList.contains('show')){
    area.classList.remove('show');
  } else {
    const item=S.blindQueue[S.blindIdx];
    document.getElementById('blindCodePre').textContent=item.answer;
    area.classList.add('show');
  }
}

function submitBlindScore(){
  const score=parseInt(document.getElementById('blindScoreInput').value);
  const note=document.getElementById('blindNoteInput').value.trim();
  if(isNaN(score)){toast('请输入分数','ri-error-warning-line');return;}
  const item=S.blindQueue[S.blindIdx];
  const entry=S.entries.find(e=>e.id===item.id);
  if(entry){entry.score=score;entry.note=note;save();}
  S.blindIdx++;
  showBlindItem();
}

function skipBlind(){S.blindIdx++;showBlindItem();}
function exitBlind(){document.getElementById('blindOverlay').classList.remove('show');renderSidebar();render();}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== ENTRIES LIST =====
function renderEntries(el){
  const unscored=S.entries.filter(e=>e.score===null||e.score===undefined);
  const scored=S.entries.filter(e=>e.score!==null&&e.score!==undefined);
  el.innerHTML=`
    <div class="sec-head"><div class="sec-title"><i class="ri-list-check-3" style="margin-right:8px;"></i>待测列表</div>
    ${unscored.length>0?`<button class="btn btn-primary" onclick="startBlind()"><i class="ri-play-line"></i> 开始盲测 (${unscored.length})</button>`:''}</div>
    ${unscored.length===0&&scored.length===0?'<div style="text-align:center;padding:60px 0;color:var(--t4);"><i class="ri-inbox-line" style="font-size:32px;display:block;margin-bottom:12px;"></i>暂无数据，请先选择维度收集答案</div>':''}
    ${unscored.length>0?`<div class="label">待评分 (${unscored.length})</div><div class="entry-list" style="margin-bottom:24px;">
      ${unscored.map(e=>{const dim=DIMS.find(d=>d.id===e.dimId);return`
        <div class="entry-item">
          <span class="entry-blind-id">${e.blindId}</span>
          <span style="font-size:13px;"><i class="${dim.icon}" style="color:${dim.color};font-size:14px;margin-right:4px;"></i>${dim.name}</span>
          <span class="entry-model" style="filter:blur(4px);user-select:none;">${e.model}</span>
          <span style="font-size:12px;color:var(--t3);">${e.qName}</span>
          <span class="entry-status pending">待评分</span>
          <button class="btn btn-ghost btn-xs" onclick="removeEntry(${e.id})"><i class="ri-delete-bin-line"></i></button>
        </div>`;}).join('')}
    </div>`:''}
    ${scored.length>0?`<div class="label">已评分 (${scored.length})</div><div class="entry-list">
      ${scored.map(e=>{const dim=DIMS.find(d=>d.id===e.dimId);return`
        <div class="entry-item">
          <span class="entry-blind-id">${e.blindId}</span>
          <span style="font-size:13px;"><i class="${dim.icon}" style="color:${dim.color};font-size:14px;margin-right:4px;"></i>${dim.name}</span>
          <span style="font-size:13px;font-weight:600;${S.revealed?'':'filter:blur(4px);user-select:none;'}">${e.model}</span>
          <span style="font-size:12px;color:var(--t3);">${e.qName}</span>
          <span class="entry-status scored">${e.score}分</span>
        </div>`;}).join('')}
    </div>`:''}
  `;
}

// ===== COMPARE =====
function renderCompare(el){
  const scored=S.entries.filter(e=>e.score!==null&&e.score!==undefined).sort((a,b)=>b.score-a.score);
  el.innerHTML=`
    <div class="sec-head"><div><div class="sec-title"><i class="ri-bar-chart-grouped-line" style="margin-right:8px;"></i>排行榜</div><div class="sec-desc">${S.revealed?'已揭盲':'双盲模式 - 名称已遮盖'}</div></div></div>
    ${scored.length===0?'<div style="text-align:center;padding:60px 0;color:var(--t4);"><i class="ri-bar-chart-grouped-line" style="font-size:32px;display:block;margin-bottom:12px;"></i>暂无评分数据</div>':`
    <div class="card"><table class="cmp-table"><thead><tr><th>排名</th><th>${S.revealed?'模型':'盲测ID'}</th><th>维度</th><th>题目</th><th>难度</th><th>分数</th></tr></thead><tbody>
      ${scored.map((r,i)=>{const dim=DIMS.find(d=>d.id===r.dimId);const dm=DIFFS.find(d=>d.id===r.qDiff);const rc=i<3?`cmp-r${i+1}`:'';return`<tr>
        <td><span class="cmp-rank ${rc}">${i+1}</span></td>
        <td>${S.revealed?`<span style="font-weight:600;">${r.model}</span> <span style="font-family:var(--mono);font-size:10px;color:var(--t4);">${r.blindId}</span>`:`<span style="font-family:var(--mono);font-size:12px;padding:2px 8px;border-radius:100px;background:var(--s3);color:var(--t3);">${r.blindId}</span>`}</td>
        <td><span style="color:${dim.color};font-size:12px;"><i class="${dim.icon}" style="font-size:14px;margin-right:4px;"></i>${dim.name}</span></td>
        <td style="font-size:13px;">${r.qName}</td>
        <td style="font-size:11px;">${dm.emoji} ${dm.name}</td>
        <td><strong>${r.score}</strong>${r.note?` <span style="font-size:11px;color:var(--t4);">— ${r.note}</span>`:''}</td>
      </tr>`;}).join('')}
    </tbody></table></div>`}
  `;
}

// ===== PROMPT =====
function renderPrompt(el){
  const p=`你是一位顶级的AI能力评审专家。请对以下LLM回答评分。

## 评分维度 (总分100)

### 准确性 (30分)
- 事实正确性 (0-15): 信息是否准确无误
- 逻辑严密性 (0-15): 推理是否合理无漏洞

### 完整性 (25分)
- 覆盖度 (0-15): 是否涵盖问题所有方面
- 深度 (0-10): 分析是否有足够深度

### 表达质量 (25分)
- 清晰度 (0-10): 表述是否清晰易懂
- 结构性 (0-8): 组织是否有条理
- 语言质量 (0-7): 用词准确、文笔流畅

### 创意与洞察 (20分)
- 原创性 (0-10): 是否有独到见解
- 实用性 (0-10): 是否有实际价值

## 输出格式 (严格JSON)
{
  "total_score": 85,
  "accuracy": { "score": 25, "max": 30, "comment": "..." },
  "completeness": { "score": 20, "max": 25, "comment": "..." },
  "expression": { "score": 22, "max": 25, "comment": "..." },
  "insight": { "score": 18, "max": 20, "comment": "..." },
  "highlights": ["亮点1", "亮点2"],
  "improvements": ["改进1", "改进2"],
  "overall_comment": "总评"
}`;
  el.innerHTML=`<div class="sec-head"><div class="sec-title"><i class="ri-file-text-line" style="margin-right:8px;"></i>评分员Prompt</div><button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writePoint(\`${p.replace(/`/g,'\\`')}\`);toast('已复制')"><i class="ri-file-copy-line"></i> 复制</button></div><div class="prompt-box">${p}</div>`;
}

// Reveal
function showRevealModal(){
  const scored=S.entries.filter(e=>e.score!==null&&e.score!==undefined);
  document.getElementById('revealMapping').innerHTML=scored.map(r=>`${r.blindId} → <strong>${r.model}</strong> (${r.qName}: ${r.score}分)`).join('<br>')||'暂无数据';
  document.getElementById('revealModal').classList.add('show');
}
function closeRevealModal(){document.getElementById('revealModal').classList.remove('show');}
function doReveal(){S.revealed=true;save();closeRevealModal();toast('已揭盲');render();}

function exportAll(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`llm-arena-${new Date().toISOString().slice(0,10)}.json`;a.click();toast('已导出');
}

function toast(msg,icon='ri-check-line'){const t=document.getElementById('toast');t.querySelector('span').textContent=msg;t.querySelector('i').className=icon;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Init
renderSidebar();render();
</script>
</body>
</html>
