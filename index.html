<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Arena - 大模型能力盲测平台</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
/* Reading this as: developer tool / evaluation platform for technical users,
   with a dark-tech minimalist language, leaning toward native CSS + restrained motion.
   Dials: DESIGN_VARIANCE=6, MOTION_INTENSITY=4, VISUAL_DENSITY=5 */

/* ===== Tokens ===== */
:root {
  --surface-0: #09090b;
  --surface-1: #111113;
  --surface-2: #18181b;
  --surface-3: #1f1f23;
  --surface-4: #27272a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.10);
  --border-active: rgba(255,255,255,0.15);
  --text-1: #fafafa;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --text-4: #52525b;
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,0.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.12);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --cyan: #06b6d4;
  --cyan-dim: rgba(6,182,212,0.12);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2');
  font-weight: 500;
  font-display: swap;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2');
  font-weight: 600;
  font-display: swap;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/GeistMono-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--surface-0);
  color: var(--text-1);
  line-height: 1.5;
  min-height: 100dvh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 2px; }

/* ===== Layout ===== */
.shell { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* ===== Nav ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(9,9,11,0.8);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
}
.nav-brand-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
}
.nav-actions { display: flex; align-items: center; gap: 8px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s ease;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn:active { transform: scale(0.98); }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border-color: transparent;
}
.btn-ghost:hover { color: var(--text-1); background: var(--surface-3); }
.btn-outline {
  background: transparent;
  color: var(--text-2);
  border-color: var(--border);
}
.btn-outline:hover { color: var(--text-1); border-color: var(--border-hover); background: var(--surface-2); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #2563eb; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: var(--radius-sm); }
.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text-3);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn-icon:hover { color: var(--text-1); background: var(--surface-3); }

/* ===== Layout Grid ===== */
.main-grid {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 1px;
  background: var(--border);
  min-height: calc(100dvh - 56px);
}
.sidebar {
  background: var(--surface-1);
  padding: 20px 0;
  overflow-y: auto;
}
.content {
  background: var(--surface-0);
  padding: 24px 32px;
  overflow-y: auto;
}

/* ===== Sidebar ===== */
.sidebar-section { margin-bottom: 24px; }
.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-4);
  padding: 0 16px;
  margin-bottom: 6px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.1s ease;
  font-size: 13px;
  color: var(--text-2);
  border-left: 2px solid transparent;
}
.sidebar-item:hover { color: var(--text-1); background: var(--surface-2); }
.sidebar-item.active {
  color: var(--text-1);
  background: var(--accent-dim);
  border-left-color: var(--accent);
}
.sidebar-item i { font-size: 16px; width: 18px; text-align: center; }
.sidebar-item .badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 100px;
  background: var(--surface-3);
  color: var(--text-3);
}

/* ===== Section Headers ===== */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.section-desc {
  font-size: 13px;
  color: var(--text-3);
  margin-top: 4px;
}

/* ===== Difficulty Pills ===== */
.diff-row { display: flex; gap: 6px; margin-bottom: 20px; }
.diff-pill {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  font-family: var(--font-sans);
}
.diff-pill:hover { border-color: var(--border-hover); color: var(--text-2); }
.diff-pill.active { background: var(--accent-dim); border-color: rgba(59,130,246,0.3); color: var(--accent); }
.diff-pill[data-d="bronze"].active { background: var(--amber-dim); border-color: rgba(245,158,11,0.3); color: var(--amber); }
.diff-pill[data-d="diamond"].active { background: var(--cyan-dim); border-color: rgba(6,182,212,0.3); color: var(--cyan); }

/* ===== Question Cards ===== */
.q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.q-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}
.q-card:hover { border-color: var(--border-hover); background: var(--surface-2); }
.q-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.q-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.q-card-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-4);
}
.q-card-diff {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 100px;
}
.q-card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.q-card-desc { font-size: 12px; color: var(--text-3); line-height: 1.5; }

/* ===== Blind Test Panel ===== */
.blind-panel {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-top: 20px;
  overflow: hidden;
}
.blind-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.blind-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
}
.blind-header-left i { color: var(--accent); font-size: 16px; }
.blind-body { padding: 20px; }

.blind-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-4);
  margin-bottom: 6px;
}
.blind-prompt-box {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-2);
  margin-bottom: 16px;
  max-height: 160px;
  overflow-y: auto;
}

/* ===== Code Editor ===== */
.editor-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.editor-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.editor-bar-left { display: flex; align-items: center; gap: 6px; }
.editor-dot { width: 8px; height: 8px; border-radius: 50%; }
.editor-filename {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
  margin-left: 6px;
}
.editor-area {
  width: 100%;
  min-height: 240px;
  padding: 16px;
  background: var(--surface-0);
  border: none;
  color: var(--text-1);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  display: block;
}
.editor-area::placeholder { color: var(--text-4); }

/* ===== Preview ===== */
.preview-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.preview-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.preview-bar-left { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
.preview-bar-left i { color: var(--green); font-size: 14px; }
.preview-device-btns { display: flex; gap: 2px; }
.preview-frame {
  width: 100%;
  min-height: 300px;
  background: #fff;
  border: none;
  display: block;
  transition: max-width 0.3s ease;
}

/* ===== Tabs ===== */
.tab-row {
  display: flex;
  gap: 2px;
  background: var(--surface-2);
  padding: 3px;
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s ease;
}
.tab-btn:hover { color: var(--text-2); }
.tab-btn.active { color: var(--text-1); background: var(--surface-3); }

/* ===== Score Display ===== */
.score-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.score-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.score-big {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}
.score-max { font-size: 16px; color: var(--text-4); font-weight: 400; }
.score-card-body { padding: 24px; }

/* Radar */
.radar-wrap { display: flex; justify-content: center; margin-bottom: 28px; }

/* Dim bars */
.dim-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.dim-item {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
}
.dim-item-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.dim-item-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.dim-item-name i { font-size: 15px; }
.dim-item-score { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
.dim-bar-track { height: 3px; background: var(--surface-4); border-radius: 2px; margin-bottom: 10px; }
.dim-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.dim-sub { font-size: 12px; color: var(--text-3); line-height: 1.6; }
.dim-sub + .dim-sub { margin-top: 4px; }

/* Feedback */
.feed-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-top: 12px;
}
.feed-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.feed-title i { font-size: 14px; }
.feed-list { list-style: none; }
.feed-li { font-size: 13px; color: var(--text-2); padding: 3px 0 3px 14px; position: relative; line-height: 1.6; }
.feed-li::before { content: ''; position: absolute; left: 0; top: 10px; width: 4px; height: 4px; border-radius: 50%; }

/* ===== Compare Table ===== */
.cmp-table { width: 100%; border-collapse: collapse; }
.cmp-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-4);
  border-bottom: 1px solid var(--border);
}
.cmp-table td {
  padding: 12px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.cmp-table tr:hover td { background: var(--surface-2); }
.cmp-rank {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}
.cmp-rank-1 { background: var(--amber-dim); color: var(--amber); }
.cmp-rank-2 { background: var(--surface-3); color: var(--text-2); }
.cmp-rank-3 { background: var(--amber-dim); color: #cd7f32; }
.cmp-bar { display: inline-flex; align-items: center; gap: 8px; }
.cmp-bar-track { width: 60px; height: 4px; background: var(--surface-4); border-radius: 2px; }
.cmp-bar-fill { height: 100%; border-radius: 2px; }
.cmp-model-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
}
.cmp-blind-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 100px;
  background: var(--surface-3);
  color: var(--text-3);
}
.cmp-reveal {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 100px;
  background: var(--green-dim);
  color: var(--green);
}

/* ===== Prompt Viewer ===== */
.prompt-box {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-3);
  white-space: pre-wrap;
  max-height: 600px;
  overflow-y: auto;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 16px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.2s ease;
  z-index: 100;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ===== Modal ===== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-bg.show { display: flex; }
.modal-box {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px;
  width: 90%;
  max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-box p { font-size: 13px; color: var(--text-3); margin-bottom: 16px; }
.modal-box textarea {
  width: 100%;
  min-height: 180px;
  padding: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-1);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  resize: vertical;
  outline: none;
}
.modal-box textarea:focus { border-color: var(--accent); }
.modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

/* ===== Reveal Animation ===== */
.reveal-mask {
  filter: blur(6px);
  user-select: none;
  transition: filter 0.5s ease;
  cursor: pointer;
}
.reveal-mask.revealed { filter: none; user-select: auto; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 16px; }
  .dim-grid { grid-template-columns: 1fr; }
  .q-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="shell nav-inner">
    <div class="nav-brand">
      <div class="nav-brand-icon"><i class="ri-flask-line"></i></div>
      <span>LLM Arena</span>
      <span style="font-size:11px;color:var(--text-4);font-weight:400;">v1.0</span>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost btn-sm" onclick="exportAll()"><i class="ri-download-2-line"></i> 导出</button>
      <button class="btn btn-outline btn-sm" onclick="showRevealModal()"><i class="ri-eye-line"></i> 揭盲</button>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="main-grid">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">评估维度</div>
      <div id="dimList"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">工具</div>
      <div class="sidebar-item" onclick="switchView('compare')"><i class="ri-bar-chart-grouped-line"></i> 排行榜</div>
      <div class="sidebar-item" onclick="switchView('prompt')"><i class="ri-file-text-line"></i> 评分Prompt</div>
    </div>
    <div class="sidebar-section" style="padding:0 16px;">
      <div style="font-size:11px;color:var(--text-4);line-height:1.6;">

  { dim:"long_context", diff:"diamond", name:"跨文档推理", prompt:"综合以下3份文档，回答'该产品是否值得投资'：\n\n文档1(产品经理)：'用户增长月均15%，留存率72%，NPS评分68。'\n文档2(CFO)：'月烧钱率$500K，现有资金可支撑8个月。毛利率-30%。'\n文档3(CTO)：'技术债务严重，核心系统需要3个月重构。竞品已获得B轮融资。'\n\n请给出综合分析和明确建议。" },
];

// ===== State =====
let state = {
  view: 'dim', // dim | compare | prompt
  currentDim: null,
  currentDiff: 'all',
  currentQ: null,
  results: [], // { blindId, realModel, dimId, qId, score, detail, revealed }
  blindCounter: 0,
  revealed: false,
};

// Load from localStorage
try {
  const saved = localStorage.getItem('llm_arena_state');
  if (saved) {
    const s = JSON.parse(saved);
    state.results = s.results || [];
    state.blindCounter = s.blindCounter || 0;
    state.revealed = s.revealed || false;
  }
} catch(e) {}

function save() {
  localStorage.setItem('llm_arena_state', JSON.stringify({
    results: state.results,
    blindCounter: state.blindCounter,
    revealed: state.revealed,
  }));
}

// ===== Render Sidebar =====
function renderSidebar() {
  const el = document.getElementById('dimList');
  el.innerHTML = DIMS.map(d => `
    <div class="sidebar-item ${state.currentDim===d.id?'active':''}" onclick="selectDim('${d.id}')">
      <i class="${d.icon}" style="color:${d.color}"></i>
      <span>${d.name}</span>
      <span class="badge">${QUESTIONS.filter(q=>q.dim===d.id).length}</span>
    </div>
  `).join('');
}

// ===== Select Dimension =====
function selectDim(id) {
  state.view = 'dim';
  state.currentDim = id;
  state.currentDiff = 'all';
  state.currentQ = null;
  renderSidebar();
  renderContent();
}

function switchView(view) {
  state.view = view;
  state.currentDim = null;
  renderSidebar();
  renderContent();
}

// ===== Render Content =====
function renderContent() {
  const el = document.getElementById('mainContent');
  if (state.view === 'compare') { renderCompare(el); return; }
  if (state.view === 'prompt') { renderPrompt(el); return; }
  if (!state.currentDim) { renderWelcome(el); return; }

  const dim = DIMS.find(d => d.id === state.currentDim);
  const qs = QUESTIONS.filter(q => q.dim === dim.id);
  const filtered = state.currentDiff === 'all' ? qs : qs.filter(q => q.diff === state.currentDiff);

  el.innerHTML = `
    <div class="section-head">
      <div>
        <div class="section-title"><i class="${dim.icon}" style="color:${dim.color};margin-right:8px;"></i>${dim.name}</div>
        <div class="section-desc">${dim.desc}</div>
      </div>
    </div>
    <div class="diff-row">
      <button class="diff-pill ${state.currentDiff==='all'?'active':''}" onclick="filterDiff('all')">全部</button>
      ${DIFFS.map(d => `<button class="diff-pill ${state.currentDiff===d.id?'active':''}" data-d="${d.id}" onclick="filterDiff('${d.id}')">${d.emoji} ${d.name}</button>`).join('')}
    </div>
    <div class="q-grid">
      ${filtered.map(q => {
        const diffMeta = DIFFS.find(d=>d.id===q.diff);
        return `
          <div class="q-card ${state.currentQ?.name===q.name?'selected':''}" onclick="selectQuestion('${dim.id}','${q.diff}','${q.name.replace(/'/g,"\\'")}')">
            <div class="q-card-head">
              <span class="q-card-diff" style="background:${dim.color}15;color:${dim.color}">${diffMeta.emoji} ${diffMeta.name}</span>
              <span style="margin-left:auto;font-size:11px;color:var(--text-4);">上限${diffMeta.max}分</span>
            </div>
            <div class="q-card-name">${q.name}</div>
            <div class="q-card-desc">${q.prompt.slice(0,80)}...</div>
          </div>
        `;
      }).join('')}
    </div>
    ${state.currentQ ? renderBlindPanel() : ''}
  `;
}

function renderWelcome(el) {
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;opacity:0.3;"><i class="ri-flask-line"></i></div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">选择一个评估维度</div>
      <div style="font-size:14px;color:var(--text-3);max-width:400px;">从左侧选择评估维度，或查看排行榜和评分Prompt。双盲模式下，模型名称在评分阶段被遮盖。</div>
    </div>
  `;
}

function filterDiff(d) {
  state.currentDiff = d;
  renderContent();
}

function selectQuestion(dimId, diff, name) {
  const q = QUESTIONS.find(q => q.dim===dimId && q.diff===diff && q.name===name);
  state.currentQ = q;
  renderContent();
  // Scroll to blind panel
  setTimeout(() => {
    const bp = document.querySelector('.blind-panel');
    if (bp) bp.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ===== Code Preview =====
document.addEventListener('input', e => {
  if (e.target.id === 'answerInput') {
    const frame = document.getElementById('previewFrame');
    if (frame) {
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open();

function setDevice(d, btn) {
  btn.parentElement.querySelectorAll('.btn-icon').forEach(b => b.style.color = '');
  btn.style.color = 'var(--accent)';
  const f = document.getElementById('previewFrame');
  if (!f) return;
  f.style.maxWidth = d==='mobile'?'375px':d==='tablet'?'768px':'100%';
  f.style.margin = d!=='desktop'?'0 auto':'0';
}

function clearAnswer() {
  const el = document.getElementById('answerInput');
  if (el) el.value = '';
}

function copyPrompt() {
  if (!state.currentQ) return;
  navigator.clipboard.writeText(state.currentQ.prompt);
  toast('Prompt已复制');
}

// ===== Blind Submission =====
function submitBlind() {
  const answer = document.getElementById('answerInput')?.value?.trim();
  const model = document.getElementById('blindModelName')?.value?.trim();
  if (!answer) { toast('请先粘贴模型回答', 'ri-error-warning-line'); return; }
  if (!model) { toast('请输入模型名称', 'ri-error-warning-line'); return; }

  state.blindCounter++;
  const blindId = `#${String(state.blindCounter).padStart(3,'0')}`;

  state.results.push({
    blindId,
    realModel: model,
    dimId: state.currentQ.dim,
    qName: state.currentQ.name,
    qDiff: state.currentQ.diff,
    prompt: state.currentQ.prompt,
    answer,
    score: null,
    detail: null,
    timestamp: new Date().toISOString(),
  });

  save();
  openImportModal();
  toast(`已提交 ${blindId}，等待评分`);
}

// ===== Import Score =====
function openImportModal() {
  document.getElementById('importModal').classList.add('show');
}
function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
}
function doImport() {
  const json = document.getElementById('importJson').value.trim();
  try {
    const data = JSON.parse(json);
    const last = state.results[state.results.length - 1];
    if (last && !last.score) {
      last.score = data.total_score || 0;
      last.detail = data;
      save();
      closeImportModal();
      document.getElementById('importJson').value = '';
      toast(`评分已记录: ${last.score}分`);

      // Show in compare
      state.view = 'compare';
      renderContent();
    }
  } catch(e) {
    toast('JSON格式错误', 'ri-error-warning-line');
  }
}

// ===== Compare / Leaderboard =====

// ===== Functionality Check (Frontend) =====
function runFuncCheck() {
  const code = document.getElementById('answerInput')?.value?.trim();
  if (!code) { toast('请先粘贴代码', 'ri-error-warning-line'); return; }

  const panel = document.getElementById('funcCheckPanel');
  const results = document.getElementById('funcCheckResults');
  const summary = document.getElementById('funcCheckSummary');
  panel.style.display = 'block';

  const checks = [];

  // 1. Can render without JS errors
  let canRender = true;
  let errorMsg = '';
  try {
    const frame = document.getElementById('previewFrame');
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
  } catch(e) {
    canRender = false;
    errorMsg = e.message;
  }
  checks.push({ name: '代码可渲染', pass: canRender, detail: canRender ? '无运行时错误' : `错误: ${errorMsg}` });

  // 2. Has HTML structure
  try {
    const frame = document.getElementById('previewFrame');
    const doc = frame.contentDocument || frame.contentWindow.document;
    const hasDoctype = code.includes('<!DOCTYPE') || code.includes('<!doctype');
    checks.push({ name: 'DOCTYPE声明', pass: hasDoctype, detail: hasDoctype ? '包含DOCTYPE' : '缺少DOCTYPE（可能导致怪异模式）' });

    // 3. Has style tag or inline styles
    const hasStyle = code.includes('<style') || code.includes('style=');
    checks.push({ name: '包含CSS样式', pass: hasStyle, detail: hasStyle ? '检测到style标签或内联样式' : '未检测到CSS样式' });

    // 4. Has visible content
    const body = doc.body;
    const hasContent = body && body.textContent.trim().length > 0;
    checks.push({ name: '有可见内容', pass: hasContent, detail: hasContent ? `检测到${body.textContent.trim().length}字符内容` : '页面无可见内容' });

    // 5. Has interactive elements
    const buttons = doc.querySelectorAll('button, a, [onclick], input, select');
    checks.push({ name: '包含交互元素', pass: buttons.length > 0, detail: buttons.length > 0 ? `检测到${buttons.length}个交互元素` : '未检测到按钮/链接/输入框' });

    // 6. Has hover styles
    const styles = doc.querySelectorAll('style');
    let hasHover = false;
    styles.forEach(s => { if (s.textContent.includes(':hover')) hasHover = true; });
    if (code.includes(':hover')) hasHover = true;
    checks.push({ name: '有悬停状态', pass: hasHover, detail: hasHover ? '检测到:hover伪类' : '未检测到hover效果' });

    // 7. Has transitions/animations
    const hasTransition = code.includes('transition') || code.includes('animation');
    checks.push({ name: '有过渡/动画', pass: hasTransition, detail: hasTransition ? '检测到transition或animation' : '未检测到过渡或动画效果' });

    // 8. Has responsive design
    const hasMedia = code.includes('@media');
    checks.push({ name: '响应式设计', pass: hasMedia, detail: hasMedia ? '检测到@media查询' : '未检测到响应式断点' });

    // 9. Uses semantic HTML
    const semanticTags = ['header', 'nav', 'main', 'section', 'article', 'footer', 'aside'];
    const foundTags = semanticTags.filter(t => code.includes(`<${t}`));
    checks.push({ name: '语义化HTML', pass: foundTags.length >= 2, detail: foundTags.length > 0 ? `使用了: ${foundTags.join(', ')}` : '未使用语义化标签（全部div）' });

    // 10. No broken images (img tags without valid src)
    const imgs = doc.querySelectorAll('img');
    let brokenImgs = 0;
    imgs.forEach(img => { if (!img.complete || img.naturalWidth === 0) brokenImgs++; });
    checks.push({ name: '无损坏图片', pass: brokenImgs === 0, detail: brokenImgs === 0 ? (imgs.length > 0 ? `${imgs.length}张图片均正常` : '无图片元素') : `${brokenImgs}张图片加载失败` });

  } catch(e) {
    checks.push({ name: 'DOM检测', pass: false, detail: `检测异常: ${e.message}` });
  }

  // Render results
  const passed = checks.filter(c => c.pass).length;
  results.innerHTML = checks.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;">
      <i class="${c.pass ? 'ri-checkbox-circle-fill' : 'ri-close-circle-fill'}" style="color:${c.pass ? 'var(--green)' : 'var(--red)'};font-size:14px;"></i>
      <span style="font-weight:500;min-width:100px;">${c.name}</span>
      <span style="color:var(--text-3);">${c.detail}</span>
    </div>
  `).join('');

  const passRate = (passed / checks.length * 100).toFixed(0);
  const color = passRate >= 80 ? 'var(--green)' : passRate >= 50 ? 'var(--amber)' : 'var(--red)';
  summary.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span>通过率: <strong style="color:${color}">${passed}/${checks.length} (${passRate}%)</strong></span>
      <span style="font-size:11px;color:var(--text-4);">${passRate >= 80 ? '功能完整，可进入美学评分' : '功能有缺失，建议先修复再评分'}</span>
    </div>
  `;
}

// ===== Toast =====
function toast(msg, icon='ri-check-line') {
  const t = document.getElementById('toast');
  t.querySelector('span').textContent = msg;
  t.querySelector('i').className = icon;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== Init =====
renderSidebar();
renderContent();
</script>
</body>
